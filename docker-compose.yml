services:
  db:
    image: mysql:8.4
    container_name: petnet-logs-db

    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}

    volumes:
      - db_data:/var/lib/mysql
      - ./database/migration.sql:/docker-entrypoint-initdb.d/migration.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: petnet-logs-api

    restart: unless-stopped

    ports:
      - "8080:80"

    env_file:
      - .env

    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: