services:
  db:
    image: mysql:8.4
    container_name: petnet-logs-db
    env_file:
      - .env.prod
    environment:
      MYSQL_ROOT_HOST: "localhost"
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data_prod:/var/lib/mysql
      - ./database/migration.sql:/docker-entrypoint-initdb.d/migration.sql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petnet-logs
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80" # ← Traefik acessa via host network
    env_file:
      - .env.prod
    volumes:
      - ./.env.prod:/var/www/.env:ro
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.petnet-logs-api.rule=Host(`${LOGS_API_HOST}`)"
      - "traefik.http.routers.petnet-logs-api.entrypoints=websecure"
      - "traefik.http.routers.petnet-logs-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.petnet-logs-api.loadbalancer.server.port=80"
    networks:
      - internal
      - petnet

volumes:
  db_data_prod:

networks:
  internal:
    driver: bridge
  petnet:
    external: true
